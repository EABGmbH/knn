name: Deploy to IONOS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update Interhyp Rate
      - Update KfW 296 Rates
    types:
      - completed

jobs:
  deploy:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT }}
          SFTP_REMOTE_DIR: ${{ secrets.IONOS_SFTP_REMOTE_DIR }}
        run: |
          if [ -z "$SFTP_HOST" ] || [ -z "$SFTP_USER" ] || [ -z "$SFTP_PASS" ]; then
            echo "Missing required secrets: IONOS_FTP_SERVER / IONOS_FTP_USERNAME / IONOS_FTP_PASSWORD"
            exit 1
          fi

          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST:${SFTP_PORT:-22}" -e "
            set cmd:fail-exit yes;
            set net:max-retries 2;
            set net:timeout 30;
            set sftp:auto-confirm yes;
            mirror -R --delete --verbose \
              --exclude-glob .git* \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob .vscode \
              --exclude-glob '*.md' \
              --exclude-glob scripts \
              --exclude-glob tsconfig.json \
              --exclude-glob package.json \
              --exclude-glob package-lock.json \
              ./ \"${SFTP_REMOTE_DIR:-/software/knn}\";
            bye"